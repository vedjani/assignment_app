<html lang='en'>
<head>

</head>
<body>

  <h1>q14 AJAX Async Request Demo</h1>

  <form id='ajax-form'>
    {% csrf_token %}
    <label for='name'>Your name:</label>
    <input type='text' id='name' name='name' placeholder='Alice' />
    <button type='submit'>Send AJAX</button>
  </form>

  <div class='output' id='ajax-response'>No response yet.</div>

  <script>
    function getCsrfToken(){
      const tokenInput = document.querySelector('[name=csrfmiddlewaretoken]');
      return tokenInput ? tokenInput.value : ''; 
    }

    async function sendAjax(data){
      const response = await fetch('ajax/', {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'X-CSRFToken': getCsrfToken(),
        },
        body: data,
      });

      return response.json();
    }

    document.getElementById('ajax-form').addEventListener('submit', async function(event){
      event.preventDefault();
      const formData = new FormData(this);

      const resultEl = document.getElementById('ajax-response');
      resultEl.textContent = 'Sending request...';

      try {
        const data = await sendAjax(formData);
        if (data.success){
          resultEl.textContent = data.message;
        } else {
          resultEl.textContent = 'Error: ' + (data.error || 'Unknown');
        }
      } catch (err) {
        console.error(err);
        resultEl.textContent = 'Network error (see console).';
      }
    });
  </script>
</body>
</html>
