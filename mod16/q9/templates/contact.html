<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Doctor Finder</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f8ff; color: #1f2f53; }
        .page { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .nav { margin-bottom: 20px; background: #2f5bb5; color: #fff; padding: 12px; border-radius: 8px; }
        .nav a { color: #fff; text-decoration: none; margin-right: 14px; }
        h1 { margin-bottom: 10px; }
        p, label { line-height: 1.6; }
        .form-group { margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #b1c4e4; border-radius: 6px; }
        button { background: #2f5bb5; color: #fff; border: none; padding: 10px 14px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<a href="/q10/" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; text-decoration: none; padding: 10px 20px; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; color: #fff; font-family: sans-serif; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;">
    Next App
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1 8a.5.5 1 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/></svg>
</a>




    <div class="page">
        <div class="nav">
            <a href="{% url 'q9:home9' %}">Home</a>
            <a href="{% url 'q9:about' %}">About</a>
            <a href="{% url 'q9:contact' %}">Contact</a>
            <a href="{% url 'q9:view_doctors' %}">View Doctors</a>
        </div>
        <h1>Contact Me</h1>
        <p>Send us your message and we will respond soon.</p>
        <form method="POST" action="#">
            {% csrf_token %}
            <div class="form-group">
                <label>Your Name</label><br>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Your Email</label><br>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Message</label><br>
                <textarea name="message" rows="4" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
