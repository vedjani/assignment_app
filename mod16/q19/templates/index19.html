<!DOCTYPE html>
<html lang="en">
<head>
    <!-- SPIDEY FONTS --><link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Login Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --surface: rgba(255, 255, 255, 0.1);
            --surface-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            padding: 20px;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
        }

        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .btn i {
            font-size: 20px;
        }

        .btn-google {
            background: rgba(0,0,0,0.6);
            color: #1f2937;
        }

        .btn-google:hover {
            background: rgba(0,0,0,0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-otp {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-otp:hover {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(99, 102, 241, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--surface-border);
        }

        .divider:not(:empty)::before {
            margin-right: 15px;
        }

        .divider:not(:empty)::after {
            margin-left: 15px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .link-card i {
            font-size: 18px;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .link-card.full-width {
            grid-column: span 2;
            flex-direction: row;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .link-card.full-width:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        /* Decorative elements */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 1;
            border-radius: 50%;
            animation: float 10s ease-in-out infinite;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.4);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: rgba(168, 85, 247, 0.3);
            animation-delay: -5s;
            animation-direction: reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-30px) scale(1.1) rotate(5deg); }
        }
    </style>

    <!-- Automatically injected responsive styles -->
    <style>
        html, body { max-width: 100%; overflow-x: hidden; }
        body { padding: 10px; box-sizing: border-box; }
        img, video, iframe, canvas, table { max-width: 100%; height: auto; display: block; overflow-x: auto; }
        .container, main, section, div { box-sizing: border-box; max-width: 100%; }
        /* Add some margin to tables on mobile so they scroll instead of break width */
        table { display: block; overflow-x: auto; white-space: nowrap; }
    </style>


<!-- SPIDEY THEME INJECT -->
<style>
    :root {
        --spidey-red: #D92525;
        --spidey-blue: #0A2463;
        --spidey-dark: #070b14;
        --spidey-light: #e2e8f0;
    }
    body {
        background-color: var(--spidey-dark) !important;
        color: var(--spidey-light) !important;
        font-family: 'Oswald', sans-serif, system-ui !important;
        background-image: 
            radial-gradient(circle at 10% 10%, rgba(217, 37, 37, 0.15) 0%, transparent 50%),
            repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 20px) !important;
    }
    h1, h2, h3 { 
        font-family: 'Bangers', cursive, impact !important; 
        color: var(--spidey-red) !important; 
        letter-spacing: 2px !important;
        text-shadow: 2px 2px 0 var(--spidey-blue) !important;
        margin-bottom: 1rem !important;
    }
    a { color: #00f0ff !important; text-decoration: none !important; }
    a:hover { color: var(--spidey-red) !important; text-decoration: underline !important; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; background: rgba(10, 36, 99, 0.4) !important; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important; color: white !important;}
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { background-color: var(--spidey-blue) !important; color: white !important; font-weight: bold; text-transform: uppercase; font-family: 'Oswald', sans-serif; letter-spacing: 1px; }
    tr:hover { background-color: rgba(217, 37, 37, 0.3) !important; }

    /* Forms */
    option { background: var(--spidey-dark) !important; color: white !important; }
    .output, .result, .message, .alert { background: rgba(0,0,0,0.5) !important; border: 1px solid var(--spidey-blue) !important; color: var(--spidey-light) !important; padding: 15px !important; border-radius: 8px !important; }
    form { margin-bottom: 2rem; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid var(--spidey-blue); }
    label { font-weight: bold; margin-bottom: 5px; display: block; color: var(--spidey-light) !important; font-family: 'Oswald', sans-serif; letter-spacing: 1px; }
    input[type="text"], input[type="number"], input[type="email"], input[type="password"], select, textarea {
        width: 100%; max-width: 500px; padding: 12px; margin: 8px 0 20px 0;
        background: rgba(255,255,255,0.05) !important; color: white !important;
        border: 2px solid var(--spidey-blue) !important; border-radius: 4px; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--spidey-red) !important; outline: none; box-shadow: 0 0 8px rgba(217, 37, 37, 0.8) !important; }

    /* Buttons */
    button, input[type="submit"], .btn {
        background: var(--spidey-red) !important; color: white !important; border: none !important;
        padding: 12px 25px !important; font-size: 1.1rem !important; font-weight: bold !important; cursor: pointer;
        border-radius: 4px !important; text-transform: uppercase !important; font-family: 'Oswald', sans-serif !important; letter-spacing: 1px;
        box-shadow: 4px 4px 0 var(--spidey-blue) !important; transition: all 0.2s !important; display: inline-block; text-align: center; margin-top: 10px;
    }
    button:hover, input[type="submit"]:hover, .btn:hover {
        transform: translateY(-2px) !important; box-shadow: 6px 6px 0 var(--spidey-blue) !important; background: rgba(0,0,0,0.6);
    }


    /* MOBILE & TABLET RESPONSIVE FIXES */
    @media (max-width: 1024px) {
        .container, main, .content, form {
            padding: 20px !important;
        }
    }
    
    @media (max-width: 768px) {
        body { padding: 10px !important; }
        h1 { font-size: 2.5rem !important; }
        h2 { font-size: 2rem !important; }
        .container, main, .content { padding: 15px !important; border-radius: 8px !important; }
        form { padding: 15px !important; margin-bottom: 1.5rem !important; }
        input[type="text"], input[type="number"], input[type="email"], input[type="password"], select, textarea {
            width: 100% !important; max-width: none !important;
        }
        table { display: block !important; overflow-x: auto !important; white-space: nowrap !important; font-size: 0.95rem !important; }
        th, td { padding: 8px 10px !important; }
        button, input[type="submit"], .btn { width: 100% !important; font-size: 1.1rem !important; margin-bottom: 5px; }
        .next-app-btn { bottom: 10px !important; right: 10px !important; padding: 8px 15px !important; font-size: 12px !important; }
    }

</style>
<!-- END SPIDEY THEME -->

</head>
<body>

<a href="/" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; text-decoration: none; padding: 10px 20px; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; color: #fff; font-family: sans-serif; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;">
    Next App
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1 8a.5.5 1 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/></svg>
</a>




    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-container">
        <div class="header">
            <div class="header-icon">
                <i class="fa-solid fa-fingerprint"></i>
            </div>
            <h1>Welcome</h1>
            <p>Access your account securely</p>
        </div>

        <div class="auth-buttons">
            <form action="/accounts/google/login/" method="post" style="width: 100%; margin: 0;">
                {% csrf_token %}
                <button type="submit" class="btn btn-google">
                    <i class="fa-brands fa-google" style="color: #ea4335;"></i>
                    Continue with Google
                </button>
            </form>
            
            <a href="/q19/otp-login/" class="btn btn-otp">
                <i class="fa-regular fa-envelope"></i>
                Continue with Email OTP
            </a>
        </div>

        <div class="divider">More Options</div>

        <div class="links-grid">
            <a href="/accounts/login/" class="link-card">
                <i class="fa-solid fa-user-lock"></i>
                Standard Login
            </a>
            <a href="/accounts/signup/" class="link-card">
                <i class="fa-solid fa-user-plus"></i>
                Create Account
            </a>
            <a href="/q19/logout/" class="link-card full-width">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                Sign Out / Logout
            </a>
        </div>
    </div>
</body>
</html>
