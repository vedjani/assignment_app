<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f8fbff; margin:0; }
    .box { max-width:480px; margin: 50px auto; padding: 25px 30px; border-radius: 10px; background:white; box-shadow: 0 2px 14px rgba(0,0,0,0.1); }
    h1 { margin-bottom: 15px; }
    .field { margin-bottom: 12px; }
    label { display:block; margin-bottom: 6px; }
    input { width:100%; padding:10px; border:1px solid #d4dce5; border-radius:5px; }
    .btn { width: 100%; margin-top: 12px; background:#5a7de0; border:none; color:#fff; padding:11px 0; border-radius:5px; font-weight:700; cursor:pointer; }
    a { color:#4667e5; text-decoration: none; display:block; margin-top: 14px; text-align:center; }
    .msg { margin-bottom: 12px; color:#333; font-size:0.94rem; }
  </style>
</head>
<body>

<a href="/" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; text-decoration: none; padding: 10px 20px; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; color: #fff; font-family: sans-serif; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;">
    Next App
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1 8a.5.5 1 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/></svg>
</a>




  <div class="box">
    <h1>Verify OTP</h1>
    <p class="msg">Enter the code that you received (shown as message in this demo).</p>
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="otp">OTP Code</label>
        <input id="otp" name="otp" type="text" required placeholder="123456" />
      </div>
      <button class="btn" type="submit">Verify & Login</button>
    </form>
    <a href="/q19/otp-login/">← Request new OTP</a>
  </div>
</body>
</html>
